<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Golden Ticket</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100 flex flex-col items-center justify-center min-h-screen">
    <div class="bg-white shadow-md rounded-lg p-8 w-full max-w-md">
        <h1 class="text-3xl font-bold text-center mb-4">Golden Ticket</h1>
        <div class="border-4 border-yellow-500 rounded-lg p-6 mb-4">
            <p class="text-xl text-center">Congratulations! You have received a Golden Ticket!</p>
        </div>
        <form id="sendTokensForm">
            <label for="address" class="block text-sm font-medium text-gray-700">MetaMask Address</label>
            <input type="text" id="address" name="address" required class="mt-1 mb-4 border border-gray-300 rounded-md p-2 w-full"/>
            <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded-md">Send BSPI Tokens</button>
        </form>
    </div>
    <script>
        document.getElementById('sendTokensForm').addEventListener('submit', async function(event) {
            event.preventDefault();
            const address = document.getElementById('address').value;
            // API call to send BSPI tokens
            try {
                const response = await fetch('API_ENDPOINT_HERE', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ address }),
                });
                const result = await response.json();
                alert(result.message); 
            } catch (error) {
                console.error('Error sending tokens:', error);
                alert('Error sending tokens');
            }
        });
    </script>
</body>
</html>

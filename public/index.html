<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <title>Golden Ticket</title>
</head>
<body class="bg-gray-100">
    <header class="bg-blue-500 text-white p-4">
        <h1 class="text-2xl">Golden Ticket Website</h1>
    </header>
    <main class="container mx-auto p-4">
        <section class="mb-6">
            <h2 class="text-xl font-semibold">Welcome to the Golden Ticket</h2>
            <p>Get ready for an amazing experience!</p>
        </section>
        <section>
            <h2 class="text-xl font-semibold">Fetch Data Example</h2>
            <button id="fetchDataBtn" class="bg-blue-500 text-white p-2 rounded">Fetch Data</button>
            <div id="dataDisplay" class="mt-4"></div>
        </section>
    </main>
    <footer class="bg-blue-500 text-white p-4 text-center">
        <p>&copy; 2026 Golden Ticket Company</p>
    </footer>
    <script>
        document.getElementById('fetchDataBtn').addEventListener('click', function() {
            fetch('https://api.example.com/data')
                .then(response => response.json())
                .then(data => {
                    document.getElementById('dataDisplay').innerHTML = JSON.stringify(data);
                })
                .catch(error => {
                    console.error('Error fetching data:', error);
                });
        });
    </script>
</body>
</html>

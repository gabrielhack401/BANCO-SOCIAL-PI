<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BSPI - Banco Social Pi | Golden Ticket</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Space Grotesk', sans-serif; }
        body { background-color: #030303; color: #fff; }
        .gradient-text { 
            background: linear-gradient(135deg, #F4DF4E 0%, #D4AF37 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .gold-glow { box-shadow: 0 0 20px rgba(212, 175, 55, 0.15); }
        .countdown-box {
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 1rem;
            padding: 1rem;
            text-align: center;
            backdrop-filter: blur(5px);
        }
        .countdown-number {
            font-size: 2rem;
            font-weight: 700;
            line-height: 1;
            color: #D4AF37;
        }
        @media (min-width: 768px) {
            .countdown-number { font-size: 2.5rem; }
        }
    </style>
</head>
<body class="bg-noise">

    <!-- TOPO COM CONTAGENS REGRESSIVAS -->
    <div class="bg-black/90 border-b border-yellow-500/20 sticky top-0 z-50 backdrop-blur-md">
        <div class="max-w-7xl mx-auto px-4 py-4">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                
                <!-- 14 de Março -->
                <div class="countdown-box">
                    <p class="text-xs text-zinc-400 mb-1">14 DE MARÇO</p>
                    <div class="flex justify-center items-center gap-1">
                        <span class="countdown-number" id="dias1">0</span><span class="text-yellow-500 text-xl">d</span>
                        <span class="countdown-number" id="horas1">0</span><span class="text-yellow-500 text-xl">h</span>
                        <span class="countdown-number" id="minutos1">0</span><span class="text-yellow-500 text-xl">m</span>
                        <span class="countdown-number" id="segundos1">0</span><span class="text-yellow-500 text-xl">s</span>
                    </div>
                </div>

                <!-- 22 de Julho -->
                <div class="countdown-box">
                    <p class="text-xs text-zinc-400 mb-1">22 DE JULHO</p>
                    <div class="flex justify-center items-center gap-1">
                        <span class="countdown-number" id="dias2">0</span><span class="text-yellow-500 text-xl">d</span>
                        <span class="countdown-number" id="horas2">0</span><span class="text-yellow-500 text-xl">h</span>
                        <span class="countdown-number" id="minutos2">0</span><span class="text-yellow-500 text-xl">m</span>
                        <span class="countdown-number" id="segundos2">0</span><span class="text-yellow-500 text-xl">s</span>
                    </div>
                </div>

                <!-- 9 de Novembro -->
                <div class="countdown-box">
                    <p class="text-xs text-zinc-400 mb-1">9 DE NOVEMBRO</p>
                    <div class="flex justify-center items-center gap-1">
                        <span class="countdown-number" id="dias3">0</span><span class="text-yellow-500 text-xl">d</span>
                        <span class="countdown-number" id="horas3">0</span><span class="text-yellow-500 text-xl">h</span>
                        <span class="countdown-number" id="minutos3">0</span><span class="text-yellow-500 text-xl">m</span>
                        <span class="countdown-number" id="segundos3">0</span><span class="text-yellow-500 text-xl">s</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- NAVBAR (agora abaixo do contador) -->
    <nav class="bg-black/80 backdrop-blur-md border-b border-white/10">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="text-2xl font-bold">
                <span class="gradient-text">π BSPI</span>
            </div>
            <div class="hidden md:flex gap-8 text-sm">
                <a href="#home" class="text-zinc-300 hover:text-yellow-500 transition">Home</a>
                <a href="#sobre" class="text-zinc-300 hover:text-yellow-500 transition">Sobre</a>
                <a href="#golden" class="text-zinc-300 hover:text-yellow-500 transition">Golden Ticket</a>
                <a href="#indicar" class="text-zinc-300 hover:text-yellow-500 transition">Indicar</a>
                <a href="#faq" class="text-zinc-300 hover:text-yellow-500 transition">FAQ</a>
            </div>
            <a href="#indicar" class="bg-yellow-500 text-black px-5 py-2 rounded-full text-sm font-bold hover:bg-yellow-400 transition">
                🎟️ Participar
            </a>
        </div>
    </nav>

    <!-- O RESTO DO SITE CONTINUA IGUAL -->
    <!-- ... (todo o conteúdo que você já tem) ... -->

    <script>
        // ==============================================
        // CONTAGEM REGRESSIVA PARA OS 3 DIAS
        // ==============================================
        function updateAllCountdowns() {
            const now = new Date().getTime();
            const currentYear = new Date().getFullYear();

            // Datas fixas (considerando ano atual)
            const dates = [
                { year: currentYear, month: 2, day: 14, hour: 15, minute: 14, second: 0 }, // 14 Mar
                { year: currentYear, month: 6, day: 22, hour: 15, minute: 14, second: 0 }, // 22 Jul
                { year: currentYear, month: 10, day: 9, hour: 15, minute: 14, second: 0 }  // 9 Nov
            ];

            // Ajusta para o próximo ano se a data já passou
            for (let i = 0; i < dates.length; i++) {
                let targetDate = new Date(dates[i].year, dates[i].month, dates[i].day, dates[i].hour, dates[i].minute, dates[i].second);
                if (targetDate.getTime() < now) {
                    targetDate = new Date(dates[i].year + 1, dates[i].month, dates[i].day, dates[i].hour, dates[i].minute, dates[i].second);
                }
                dates[i].target = targetDate.getTime();
            }

            // Função para calcular diferença
            function getDiff(target) {
                const diff = target - now;
                if (diff <= 0) return { dias: 0, horas: 0, minutos: 0, segundos: 0, passou: true };
                return {
                    dias: Math.floor(diff / (1000 * 60 * 60 * 24)),
                    horas: Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)),
                    minutos: Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60)),
                    segundos: Math.floor((diff % (1000 * 60)) / 1000),
                    passou: false
                };
            }

            // Atualiza cada contador
            const diffs = dates.map(d => getDiff(d.target));
            
            document.getElementById('dias1').innerText = diffs[0].dias;
            document.getElementById('horas1').innerText = diffs[0].horas;
            document.getElementById('minutos1').innerText = diffs[0].minutos;
            document.getElementById('segundos1').innerText = diffs[0].segundos;

            document.getElementById('dias2').innerText = diffs[1].dias;
            document.getElementById('horas2').innerText = diffs[1].horas;
            document.getElementById('minutos2').innerText = diffs[1].minutos;
            document.getElementById('segundos2').innerText = diffs[1].segundos;

            document.getElementById('dias3').innerText = diffs[2].dias;
            document.getElementById('horas3').innerText = diffs[2].horas;
            document.getElementById('minutos3').innerText = diffs[2].minutos;
            document.getElementById('segundos3').innerText = diffs[2].segundos;
        }

        // Atualiza a cada segundo
        setInterval(updateAllCountdowns, 1000);
        updateAllCountdowns(); // primeira execução

        // ==============================================
        // RESTO DO SEU CÓDIGO (carregar dados, etc)
        // ==============================================
        async function carregarDados() {
            try {
                const res = await fetch('/api/saldo');
                const data = await res.json();
                if (data.saldo) {
                    const totalSupply = 31416000;
                    const queimado = totalSupply - parseFloat(data.saldo);
                    document.getElementById('totalQueimado').innerText = queimado.toFixed(0);
                }
            } catch (e) {
                console.log('API de saldo não disponível');
            }
        }
        carregarDados();
    </script>
</body>
</html>

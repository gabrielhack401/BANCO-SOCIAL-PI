<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin - BSPI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #080808; color: #fff; font-family: 'Space Grotesk', sans-serif; }
    </style>
</head>
<body class="p-6">
    <div class="max-w-4xl mx-auto">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-bold text-yellow-500">⚙️ PAINEL ADMIN BSPI</h1>
            <a href="/admin/logout" class="bg-red-600 text-white px-4 py-2 rounded-xl">Sair</a>
        </div>

        <div class="grid md:grid-cols-2 gap-6">
            <!-- Card Saldo -->
            <div class="bg-zinc-900 p-6 rounded-2xl border border-yellow-500/30">
                <h2 class="text-xl mb-4 text-zinc-400">💰 Saldo da Master</h2>
                <div id="saldo" class="text-3xl font-bold text-yellow-500">---</div>
                <div id="endereco" class="text-xs text-zinc-600 mt-2"></div>
            </div>

            <!-- Card Recompensa -->
            <div class="bg-zinc-900 p-6 rounded-2xl border border-yellow-500/30">
                <h2 class="text-xl mb-4 text-zinc-400">🎁 Recompensa Atual</h2>
                <div id="recompensaAtual" class="text-3xl font-bold text-yellow-500">---</div>
                <div class="mt-4">
                    <label class="block text-sm mb-2">Alterar para:</label>
                    <input type="number" id="novoValor" value="5" min="1" step="1"
                           class="bg-zinc-800 p-3 rounded-xl w-full mb-2 text-white">
                    <button onclick="alterarRecompensa()" 
                            class="w-full bg-yellow-500 text-black font-bold py-3 rounded-xl">
                        ATUALIZAR
                    </button>
                </div>
            </div>
        </div>

        <!-- Info do contrato -->
        <div class="mt-8 bg-zinc-900 p-6 rounded-2xl border border-zinc-800">
            <h2 class="text-xl mb-4">📄 Informações do Contrato</h2>
            <p class="text-sm text-zinc-400">Endereço: <span id="contrato" class="text-yellow-500"></span></p>
            <p class="text-sm text-zinc-400 mt-2">Rede: <span id="rede" class="text-yellow-500"></span></p>
        </div>
    </div>

    <script>
        async function carregarDados() {
            try {
                const res = await fetch('/api/admin/dados');
                const data = await res.json();
                
                if (data.erro) {
                    alert('Erro: ' + data.erro);
                    return;
                }

                document.getElementById('saldo').innerText = data.saldo + ' BSPI';
                document.getElementById('endereco').innerText = data.endereco;
                document.getElementById('recompensaAtual').innerText = data.recompensaAtual + ' BSPI';
                document.getElementById('contrato').innerText = data.contrato;
                document.getElementById('rede').innerText = data.rede;
            } catch (error) {
                console.error(error);
            }
        }

        async function alterarRecompensa() {
            const novoValor = document.getElementById('novoValor').value;
            
            const res = await fetch('/api/admin/set-recompensa', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ novoValor })
            });

            const data = await res.json();
            
            if (data.ok) {
                alert(`✅ Recompensa alterada para ${data.novaRecompensa} BSPI`);
                carregarDados();
            } else {
                alert('❌ Erro: ' + data.erro);
            }
        }

        carregarDados();
    </script>
</body>
</html>
